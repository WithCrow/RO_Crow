@PART[_Knes_French_Hermes]:FOR[RealismOverhaul]
{
    %RSSROConfig = true
    @rescaleFactor = 1.44
    @manufacturer = Aérospatiale / Dassault-Breguet
    @title = Callisto
    @description = The original version of the Hermes spaceplane as developed by CNES. To distinguish it from the larger ESA version, it is referred to as Callisto.

    @mass = 8.5
    @CrewCapacity = 3

    @maxTemp = 773
    %skinMaxTemp = 2000
    %heatConductivity = 0.01 
    %skinInternalConductionMult = 0.005 
    %skinSkinConductionMult = 0.1
    %emissiveConstant = 0.95 

    !MODULE[ModuleReactionWheel] {}

    @RESOURCE[ElectricCharge]
    {
        @amount = 12500
        @maxAmount = 12500
    }
    !RESOURCE[MonoPropellant] {}

    @MODULE[ModuleCommand]
    {
        @minimumCrew = 0
        RESOURCE
        {
            name = ElectricCharge
            rate = 1.5 // kW
        }
    }

    @MODULE[ModuleRCS*]
    {
        @name = ModuleRCSFX
        @thrusterPower = 0.400 
        @stagingEnabled = True
        
        !resourceName = DELETE
        !PROPELLANT[*],* {}

        PROPELLANT
        {
            name = MMH
            ratio = 0.4943
        }
        PROPELLANT
        {
            name = MON3
            ratio = 0.5057
        }
        PROPELLANT
        {
            name = Helium
            ratio = 12.9
            ignoreForIsp = true
        }
        
        !atmosphereCurve {}
        atmosphereCurve
        {
            key = 0 340
            key = 1 110
        }
    }

    !MODULE[ModuleResourceConverter] {}

    MODULE
    {
        name = ModuleFuelTanks
        type = ServiceModule
        volume = 785.96 
        basemass = -1

        TANK
        {
            name = MMH
            amount = 180
            maxAmount = 180
        }
        TANK
        {
            name = MON3
            amount = 184
            maxAmount = 184
        }
        TANK
        {
            name = Helium
            amount = 4500
            maxAmount = 4500
        }
        TANK
        {
            name = Hydrogen
            amount = 5000
            maxAmount = 5000
        }
        TANK
        {
            name = Oxygen
            amount = 2600
            maxAmount = 2600
        }
        TANK
        {
            name = ElectricCharge
            amount = 846.8
            maxAmount = 846.8
        }
    }
}

@PART[_French_Hermes_OME_Engine]:FOR[RealismOverhaul]
{
    %RSSROConfig = True
    @rescaleFactor = 1.44
    @title = Callisto OME Thruster
    @description = Callisto's Orbital Maneuvering Engine
    @manufacturer = DASA
    @mass = 0.115

    @MODULE[ModuleEngines*]
    {
        @minThrust = 27.5
        @maxThrust = 27.5
        @heatProduction = 100
        %EngineType = LiquidFuel
        
        !PROPELLANT[*],* {}
        
        PROPELLANT
        {
            name = MMH
            ratio = 0.4943
            DrawGauge = True
        }
        PROPELLANT
        {
            name = MON3
            ratio = 0.5057
        }
        
        !atmosphereCurve {}
        atmosphereCurve
        {
            key = 0 324
            key = 1 150
        }
    }
}

