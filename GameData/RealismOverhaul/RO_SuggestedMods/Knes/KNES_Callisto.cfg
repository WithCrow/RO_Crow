@PART[_Knes_French_Hermes_Crew_Module]:FOR[RealismOverhaul]
{
    %RSSROConfig = True
    @title = Callisto Pressurized Payload Module
    @description = An optional pressurized payload module for Callisto, providing extra living space and supplementary life support for extended missions.
    @manufacturer = Aérospatiale
    @rescaleFactor = 1.44
    @mass = 1.8
    %CrewCapacity = 2

    // Thermal values are lower as it sits inside the cargo bay
    @maxTemp = 773
    %skinMaxTemp = 2000

    !RESOURCE,* {}
    !MODULE[ModuleFuelTanks] {}

    MODULE
    {
        name = ModuleFuelTanks
        type = ServiceModule
        volume = 800
        basemass = -1
        
        TANK
        {
            name = Oxygen
            amount = 4000
            maxAmount = 4000
        }
        TANK
        {
            name = Food
            amount = 60
            maxAmount = 60
        }
        TANK
        {
            name = Water
            amount = 40
            maxAmount = 40
        }
        TANK
        {
            name = ElectricCharge
            amount = 10000
            maxAmount = 10000
        }
    }
}

