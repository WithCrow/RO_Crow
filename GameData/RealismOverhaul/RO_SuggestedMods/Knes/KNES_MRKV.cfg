@PART[_Knes_mrk_LES]:FOR[RealismOverhaul]
{
    %RSSROConfig = true
    @title = Multi-Role Capsule LES
    @manufacturer = British Aerospace
    @description = A Launch Escape System for the Multi-Role Capsule

    @rescaleFactor = 1.6
    @mass = 0.4
    @maxTemp = 1900
    @skinMaxTemp = 2800

    !RESOURCE,* {}

    MODULE
    {
        name = ModuleFuelTanks
        type = HTPB
        volume = 450
        basemass = -1
        
        TANK
        {
            name = HTPB
            amount = 450
            maxAmount = 450
        }
