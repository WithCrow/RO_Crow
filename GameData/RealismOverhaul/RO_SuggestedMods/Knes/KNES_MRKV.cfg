@PART[_Knes_mrk_Pod_Rescue]:FOR[RealismOverhaul]
{
    %RSSROConfig = true
    @title = Multi-Role Capsule
    @manufacturer = British Aerospace
    @description = The Multi-Role Capsule was proposed by British Aerospace as a cheaper, safer & simpler alternative to the Hermes spaceplane.
    %specLevel = speculative
    @rescaleFactor = 1.6
    @mass = 2.5
    @maxTemp = 900
    @skinMaxTemp = 2000
    %CrewCapacity = 4

    @MODULE[ModuleCommand]
    {
        @minimumCrew = 0
        RESOURCE
        {
            name = ElectricCharge
            rate = 1.5
        }
    }

    !RESOURCE,* {}
    !MODULE[ModuleFuelTanks] {}
    !MODULE[ModuleB9PartSwitch] {}

    MODULE
    {
        name = ModuleFuelTanks
        type = ServiceModule
        volume = 900
        basemass = -1
        
        TANK
        { 
            name = ElectricCharge
            amount = 55000
            maxAmount = 55000
        }
        TANK
        {
            name = Oxygen
            amount = 2000
            maxAmount = 2000
        }
        TANK
        {
            name = Food
            amount = 15
            maxAmount = 15
        }
        TANK
        {
            name = Water
            amount = 10
            maxAmount = 10
        }
        TANK
        {
            name = CarbonDioxide
            amount = 0  
            maxAmount = 2000
        }
        TANK
        {
            name = Waste
            amount = 0
            maxAmount = 15 
        }
        TANK
        {
            name = WasteWater
            amount = 0
            maxAmount = 15
        }
        TANK
        {
            name = LithiumHydroxide
            amount = 2.5
            maxAmount = 2.5
        }
        
        TANK
        {
            name = MMH
            amount = 18.3
            maxAmount = 18.3
        }
        TANK
        {
            name = MON3
            amount = 18.7
            maxAmount = 18.7
        }
        TANK
        {
            name = Helium
            amount = 600
            maxAmount = 600
        }
    }

    MODULE:NEEDS[TacLifeSupport]
	{
		name = TacGenericConverter
		%converterName = CO2 Scrubber
		%StartActionName = Start AirFilter
		%StopActionName = Stop AirFilter
		%conversionRate = 4.0	// # of people - Figures based on per/person
		//inputResources = CarbonDioxide, 0.006216, ElectricCharge, 0.010, LithiumHydroxide, 0.00001189
		//outputResources = Waste, 0.00003932, false
		%INPUT_RESOURCE
		{
			%ResourceName = ElectricCharge
			%Ratio = 0.1
		}
		%INPUT_RESOURCE
		{
			%ResourceName = CarbonDioxide
			%Ratio = 0.006216
		}
		%INPUT_RESOURCE
		{
			%ResourceName = LithiumHydroxide
			%Ratio = 0.00001189
		}
		%OUTPUT_RESOURCE
		{
			%ResourceName = Waste
			%Ratio = 0.00003932
			%DumpExcess = false
		}
	}

    MODULE:NEEDS[TacLifeSupport]
    {
        name = TacGenericConverter
        %converterName = O2 Pressure Control
        %StartActionName = Start O2 Pressure Control
        %StopActionName = Stop O2 Pressure Control
        %conversionRate = 4.0 

        %INPUT_RESOURCE
        {
            %ResourceName = ElectricCharge
            %Ratio = 0.05
        }
        %INPUT_RESOURCE
        {
            %ResourceName = Oxygen
            %Ratio = 0.003184 
        }
    }

    @MODULE[ModuleRCS*]
    {
        @thrusterPower = 0.15
        !resourceName = *
        !PROPELLANT[*],* {}
        
        PROPELLANT
        {
            name = MMH
            ratio = 0.4945
        }
        PROPELLANT
        {
            name = MON3
            ratio = 0.5055
        }
        
        @atmosphereCurve
        {
            @key,0 = 0 280
            @key,1 = 1 100
        }
    }
}

@PART[_Knes_mrk_Pod_Rescue]:AFTER[RealAntennas]
{
    @MODULE[ModuleRealAntenna]
    {
        @referenceGain = 1.5
        !antennaDiameter = DEL
    }
}

@PART[_Knes_mrk_HeatSheild]:FOR[RealismOverhaul]
{
    %RSSROConfig = true
    @title = Multi-Role Capsule Heatshield
    @manufacturer = British Aerospace
    @description = An ablative heatshield for the British Multi-Role Capsule
    %specLevel = speculative
    @rescaleFactor = 1.6
    @mass = 0.08
    @maxTemp = 1500
    @skinMaxTemp = 3000

    !RESOURCE[Ablator] {}
    !MODULE[ModuleAblator] {}

    MODULE
    {
        name = ModuleAblator
        ablativeResource = Ablator
        lossExp = -7500
        lossConst = 0.1
        pyrolysisLossFactor = 6000
        reentryConductivity = 0.01
        ablationTempThresh = 500
    }

    RESOURCE
    {
        name = Ablator
        amount = 250
        maxAmount = 250
    }
}

@PART[_Knes_mrk_Parachute]:FOR[RealismOverhaul]
{
    %RSSROConfig = true
    @title = Multi-Role Capsule Parachute
    @manufacturer = British Aerospace
    @description = A parachute for the British Multi-Role Capsule
    %specLevel = speculative
    @rescaleFactor = 1.6
    @mass = 0.1
    @maxTemp = 900
    @skinMaxTemp = 2000

    !MODULE[ModuleParachute],* {}
    !MODULE[ModuleDragModifier],* {}

    @MODULE[RealChuteModule],0 // Drogue
    {
        %caseMass = 0.04
        %spareChutes = 1
        @PARACHUTE,0
        {
            @preDeployedDiameter = 2.0
            @deployedDiameter = 5.0
            @minDeployment = 10000
            @deploymentAlt = 7000
        }
    }

    @MODULE[RealChuteModule],1 // Main
    {
        %caseMass = 0.06
        %spareChutes = 1
        @PARACHUTE,0
        {
            @preDeployedDiameter = 5.0
            @deployedDiameter = 22.0
            @minDeployment = 3000
            @deploymentAlt = 1000
        }
    }
}

