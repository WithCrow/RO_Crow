@PART[_Knes_mrk_Pod_Rescue]:FOR[RealismOverhaul]
{
    %RSSROConfig = true
    @title = Multi-Role Capsule
    @manufacturer = British Aerospace
    @description = The Multi-Role Capsule was proposed by British Aerospace as a cheaper, safer & simpler alternative to the Hermes spaceplane.

    @rescaleFactor = 1.6
    @mass = 2.5
    @maxTemp = 900
    @skinMaxTemp = 2000

    @MODULE[ModuleCommand]
    {
        @minimumCrew = 0
        RESOURCE
        {
            name = ElectricCharge
            rate = 1.5
        }
    }

    !RESOURCE,* {}
    !MODULE[ModuleFuelTanks] {}
    !MODULE[ModuleB9PartSwitch] {}

    MODULE
    {
        name = ModuleFuelTanks
        volume = 300
        type = Fuselage
        basemass = -1
        
        TANK
        {
            name = ElectricCharge
            amount = 55000
            maxAmount = 55000
        }
        TANK
        {
            name = Oxygen
            amount = 2000
            maxAmount = 2000
        }
        TANK
        {
            name = Food
            amount = 15
            maxAmount = 15
        }
        TANK
        {
            name = Water
            amount = 10
            maxAmount = 10
        }
        TANK
        {
            name = CarbonDioxide
            amount = 0
            maxAmount = 2000
        }
        TANK
        {
            name = Waste
            amount = 0
            maxAmount = 15
        }
        TANK
        {
            name = WasteWater
            amount = 0
            maxAmount = 15
        }
        TANK
        {
            name = LithiumHydroxide
            amount = 2.5
            maxAmount = 2.5
        }
    }
}

@PART[_Knes_mrk_HeatSheild]:FOR[RealismOverhaul]
{
    %RSSROConfig = true
    @title = Multi-Role Capsule Heatshield
    @manufacturer = British Aerospace
    @description = An ablative heatshield for the British Multi-Role Capsule

    @rescaleFactor = 1.6
    @mass = 0.08
    @maxTemp = 1500
    @skinMaxTemp = 3000

    !RESOURCE[Ablator] {}
    !MODULE[ModuleAblator] {}

    MODULE
    {
        name = ModuleAblator
        ablativeResource = Ablator
        lossExp = -7500
        lossConst = 0.1
        pyrolysisLossFactor = 6000
        reentryConductivity = 0.01
        ablationTempThresh = 500
    }

    RESOURCE
    {
        name = Ablator
        amount = 250
        maxAmount = 250
    }
}

@PART[_Knes_mrk_Parachute]:FOR[RealismOverhaul]
{
    %RSSROConfig = true
    @title = Multi-Role Capsule Parachute
    @manufacturer = British Aerospace
    @description = A parachute for the British Multi-Role Capsule

    @rescaleFactor = 1.6
    @mass = 0.1
    @maxTemp = 900
    @skinMaxTemp = 2000

    !MODULE[ModuleParachute],* {}
    !MODULE[ModuleDragModifier],* {}

    MODULE
    {
        name = RealChuteModule
        caseMass = 0.1
        timer = 0
        mustGoDown = True
        cutSpeed = 0.5
        spareChutes = 1

        PARACHUTE
        {
            material = Nylon
            preDeployedDiameter = 3.0
            deployedDiameter = 20.0
            minIsPressure = False
            minDeployment = 3000
            deploymentAlt = 1000
            cutAlt = -1
            preDeploymentSpeed = 2
            deploymentSpeed = 6
            
            parachuteName = canopy
            capName = cap
            preDeploymentAnimation = semiDeploySmall
            deploymentAnimation = fullyDeploySmall
        }
    }
}

@PART[_Knes_mrk_SM_Rescue]:FOR[RealismOverhaul]
{
    %RSSROConfig = true
    @title = Multi-Role Capsule Service Module
    @manufacturer = British Aerospace
    @description = A service module for the British Multi-Role Capsule

    @rescaleFactor = 1.6
    @mass = 0.4
    @maxTemp = 900
    @skinMaxTemp = 2000

    !RESOURCE,* {}
    !MODULE[ModuleB9PartSwitch] {}
    !MODULE[ModuleFuelTanks] {}

    MODULE
    {
        name = ModuleFuelTanks
        type = ServiceModule
        volume = 400
        basemass = -1
        
        TANK
        {
            name = MMH
            amount = 200
            maxAmount = 200
        }
        TANK
        {
            name = NTO
            amount = 200
            maxAmount = 200
        }
    }

    @MODULE[ModuleEngines*]
    {
        !PROPELLANT[*],* {}
        
        PROPELLANT
        {
            name = MMH
            ratio = 0.5
            DrawGauge = True
        }
        PROPELLANT
        {
            name = NTO
            ratio = 0.5
        }
        
        @atmosphereCurve
        {
            @key,0 = 0 280
            @key,1 = 1 100
        }
    }
}

