@PART[_Knes_mrk_Thruster]:FOR[RealismOverhaul]
{
    %RSSROConfig = true
    @title = Multi-Role Capsule OAMS
    @manufacturer = British Aerospace
    @description = OAMS for the British Multi-Role Capsule From Knes mod
    
    @rescaleFactor = 1.6
    @mass = 0.03
    @maxTemp = 900
    @skinMaxTemp = 2000

    !RESOURCE,* {}
    !MODULE[ModuleRCS*] {}
    !MODULE[ModuleEngines*] {}

    MODULE
    {
        name = ModuleEnginesRF
        thrustVectorTransformName = thrustTransform
        exhaustDamage = True
        ignitionThreshold = 0.1
        minThrust = 0
        maxThrust = 1.6
        heatProduction = 10
        
        PROPELLANT
        {
            name = MMH
            ratio = 0.4945
            DrawGauge = True
        }
        PROPELLANT
        {
            name = MON3
            ratio = 0.5055
        }
        
        atmosphereCurve
        {
            key = 0 312
            key = 1 85
        }
    }

    MODULE
    {
        name = ModuleEngineConfigs
        type = ModuleEnginesRF
        configuration = MRC-OAMS
        origMass = 0.03

        CONFIG
        {
            name = MRC-OAMS
            minThrust = 0
            maxThrust = 1.6
            heatProduction = 10
            
            PROPELLANT
            {
                name = MMH
                ratio = 0.4945
                DrawGauge = True
            }
            PROPELLANT
            {
                name = MON3
                ratio = 0.5055
            }
            
            atmosphereCurve
            {
                key = 0 312
                key = 1 85
            }
            
            ullage = False
            pressureFed = True
            ignitions = 250
            
            IGNITOR_RESOURCE
            {
                name = ElectricCharge
                amount = 0.005
            }
        }
    }
}

