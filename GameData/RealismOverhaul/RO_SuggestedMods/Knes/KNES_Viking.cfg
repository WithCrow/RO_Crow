@PART[Knes_Crew_Pod_09375]:FOR[RealismOverhaul]
{
    %RSSROConfig = true

    @title = Viking Crew Capsule

    @rescaleFactor = 1.6
    @mass = 1.2

    @maxTemp = 900
    @skinMaxTemp = 2000

    @MODULE[ModuleCommand]
    {
        @minimumCrew = 0
        RESOURCE
        {
            name = ElectricCharge
            rate = 1.5 // in kW
        }
    }

    !RESOURCE[Ablator]{}
    !MODULE[ModuleAblator]{}

    MODULE
    {
        name = ModuleAblator
        ablativeResource = Ablator
        lossExp = -7500
        lossConst = 0.1
        pyrolysisLossFactor = 6000
        reentryConductivity = 0.01
        ablationTempThresh = 500
    }

    RESOURCE
    {
        name = Ablator
        amount = 150
        maxAmount = 150
    }

    !RESOURCE[LiquidFuel] {}
    !RESOURCE[Oxidizer] {}
    !RESOURCE[MonoPropellant] {}
    !RESOURCE[ElectricCharge] {}

    MODULE
	{
		name = ModuleFuelTanks
		volume = 150
		type = Fuselage
		basemass = -1
		TANK
		{
			name = ElectricCharge
			amount = 46656
			maxAmount = 69984
		}
		TANK
		{
			name = HTP
			amount = 17.434
			maxAmount = 17.434
		}
		TANK
		{
			name = Oxygen
			amount = 890
			maxAmount = 890
		}
		TANK
		{
			name = Food
			amount = 5.85
			maxAmount = 5.85
		}
		TANK
		{
			name = Water
			amount = 3.87
			maxAmount = 3.87
		}
		TANK
		{
			name = CarbonDioxide
			amount = 0
			maxAmount = 256
		}
		TANK
		{
			name = Waste
			amount = 0
			maxAmount = 4.15
		}
		TANK
		{
			name = WasteWater
			amount = 0
			maxAmount = 7.40
		}
		TANK
		{
			name = LithiumHydroxide
			amount = 0.75
			maxAmount = 0.75
		}
	}
}

