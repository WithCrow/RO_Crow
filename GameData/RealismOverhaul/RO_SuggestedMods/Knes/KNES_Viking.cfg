@PART[Knes_Parachute_Inline_0625]:FOR[RealismOverhaul]
{
    %RSSROConfig = true
    @rescaleFactor = 1.6
    @mass = 0.08
    @maxTemp = 900
    @skinMaxTemp = 2000

    !MODULE[ModuleParachute],* {}
    !MODULE[ModuleDragModifier],* {}

    MODULE
    {
        name = RealChuteModule
        caseMass = 0.08
        timer = 0
        mustGoDown = True
        cutSpeed = 0.5
        spareChutes = 1

        PARACHUTE
        {
            material = Nylon
            preDeployedDiameter = 2.5
            deployedDiameter = 16.0
            minIsPressure = False
            minDeployment = 3000
            deploymentAlt = 1000
            cutAlt = -1
            preDeploymentSpeed = 2
            deploymentSpeed = 6
            
            parachuteName = canopy
            capName = cap
            preDeploymentAnimation = semiDeploySmall
            deploymentAnimation = fullyDeploySmall
        }
    }
}

@PART[Knes_Service_Module_Viking_09375]:FOR[RealismOverhaul]
{
    %RSSROConfig = true
    @rescaleFactor = 1.6
    @mass = 0.3
    @maxTemp = 900
    @skinMaxTemp = 2000

    !RESOURCE,* {}
    !MODULE[ModuleB9PartSwitch] {}
    !MODULE[ModuleFuelTanks] {}

    MODULE
    {
        name = ModuleFuelTanks
        type = ServiceModule
        volume = 800
        basemass = -1
        
        TANK
        {
            name = HTP
            amount = 800
            maxAmount = 800
        }
    }

    @MODULE[ModuleEngines*]
    {
        !PROPELLANT[*],* {}
        
        PROPELLANT
        {
            name = HTP
            ratio = 1.0
            DrawGauge = True
        }
        
        @atmosphereCurve
        {
            @key,0 = 0 140
            @key,1 = 1 40
        }
    }

    @MODULE[ModuleRCS*]
    {
        @thrusterPower = 0.15
        !resourceName = *
        !PROPELLANT[*],* {}
        
        PROPELLANT
        {
            name = HTP
            ratio = 1.0
        }
        
        @atmosphereCurve
        {
            @key,0 = 0 130
            @key,1 = 1 40
        }
    }
}

