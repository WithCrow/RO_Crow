@PART[Knes_Parachute_Inline_0625]:FOR[RealismOverhaul]
{
    %RSSROConfig = true
    @title = Viking Capsule Parachute
    @rescaleFactor = 2.016
    @mass = 0.08
    @maxTemp = 900
    @skinMaxTemp = 2000

    !MODULE[ModuleParachute],* {}
    !MODULE[ModuleDragModifier],* {}

    MODULE
    {
        name = RealChuteModule
        caseMass = 0.08
        timer = 0
        mustGoDown = false
        reverseOrientation = true
        spareChutes = 1
        cutSpeed = 0.5
        
        PARACHUTE
        {
            material = Nylon
            preDeployedDiameter = 4.0
            deployedDiameter = 26.0
            minIsPressure = false
            minDeployment = 3000
            deploymentAlt = 1000
            cutAlt = -1
            preDeploymentSpeed = 2
            deploymentSpeed = 6
            preDeploymentAnimation = semiDeploySmall
            deploymentAnimation = fullyDeploySmall
            parachuteName = canopy
            capName = cap
        }
    }
}

@PART[Knes_Service_Module_Viking_09375]:FOR[RealismOverhaul]
{
    %RSSROConfig = true
    @title = Viking Service Module
    @description = A service module for ESA's Viking capsule
    @manufacturer = Aérospatiale, Alenia Spazio & Deutsche Aerospace
    %specLevel = speculative
    @rescaleFactor = 2.016
    @mass = 0.3
    @maxTemp = 900
    @skinMaxTemp = 2000

    !RESOURCE,* {}
    !MODULE[ModuleB9PartSwitch] {}
    !MODULE[ModuleFuelTanks] {}

    MODULE
    {
        name = ModuleFuelTanks
        type = ServiceModule
        volume = 350
        basemass = -1
        
        TANK
        {
            name = MMH
            amount = 140
            maxAmount = 140
        }
        TANK
        {
            name = NTO
            amount = 140
            maxAmount = 140
        }
    }

    @MODULE[ModuleEngines*]
    {
        !PROPELLANT[*],* {}
        
        PROPELLANT
        {
            name = MMH
            ratio = 0.5
            DrawGauge = True
        }
        PROPELLANT
        {
            name = NTO
            ratio = 0.5
        }
        
        @atmosphereCurve
        {
            @key,0 = 0 273
            @key,1 = 1 100
        }
    }

    @MODULE[ModuleRCS*]
    {
        @thrusterPower = 0.15
        !resourceName = *
        !PROPELLANT[*],* {}
        
        PROPELLANT
        {
            name = MMH
            ratio = 0.5
        }
        PROPELLANT
        {
            name = NTO
            ratio = 0.5
        }
        
        @atmosphereCurve
        {
            @key,0 = 0 273
            @key,1 = 1 100
        }
    }
}

