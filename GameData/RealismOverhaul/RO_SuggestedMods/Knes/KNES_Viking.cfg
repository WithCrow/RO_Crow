@PART[Knes_Crew_Pod_09375]:FOR[RealismOverhaul]
{
    %RSSROConfig = true
    %specLevel = speculative
    @title = Viking Crew Capsule
    @description = The European Crew Rescue Vehicle 'Viking' was proposed in the mid 1990s to return crew from the ISS. 
    @manufacturer = Aérospatiale, Alenia Spazio & Deutsche Aerospace

    %CrewCapacity = 1
    @rescaleFactor = 2.016
    @mass = 1.95

    @maxTemp = 900
    @skinMaxTemp = 2000

    @MODULE[ModuleCommand]
    {
        @minimumCrew = 0
        RESOURCE
        {
            name = ElectricCharge
            rate = 1.5 // in kW
        }
    }

    !RESOURCE[Ablator]{}
    !MODULE[ModuleAblator]{}

    MODULE
    {
        name = ModuleAblator
        ablativeResource = Ablator
        lossExp = -7500
        lossConst = 0.1
        pyrolysisLossFactor = 6000
        reentryConductivity = 0.01
        ablationTempThresh = 500
    }

    RESOURCE
    {
        name = Ablator
        amount = 150
        maxAmount = 150
    }

    !RESOURCE[LiquidFuel] {}
    !RESOURCE[Oxidizer] {}
    !RESOURCE[MonoPropellant] {}
    !RESOURCE[ElectricCharge] {}

    MODULE
    {
        name = ModuleFuelTanks
        volume = 150
        type = Fuselage
        basemass = -1
        TANK
        {
            name = ElectricCharge
            amount = 46656
            maxAmount = 69984
        }
        TANK
        {
            name = MMH
            amount = 8.7
            maxAmount = 8.7
        }
        TANK
        {
            name = NTO
            amount = 8.7
            maxAmount = 8.7
        }
        TANK
        {
            name = Oxygen
            amount = 890
            maxAmount = 890
        }
        TANK
        {
            name = Food
            amount = 5.85
            maxAmount = 5.85
        }
        TANK
        {
            name = Water
            amount = 3.87
            maxAmount = 3.87
        }
        TANK
        {
            name = CarbonDioxide
            amount = 0
            maxAmount = 256
        }
        TANK
        {
            name = Waste
            amount = 0
            maxAmount = 4.15
        }
        TANK
        {
            name = WasteWater
            amount = 0
            maxAmount = 7.40
        }
        TANK
        {
            name = LithiumHydroxide
            amount = 0.75
            maxAmount = 0.75
        }
    }
}

